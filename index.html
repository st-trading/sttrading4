<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="google-site-verification" content="aeK7CSWYjL9vIikd02Qi1p0JXeNFIWsO79Pq6lFDNOM" />
    <meta name="description" content="화장품 원료 공급 전문 기업 에스티트레이딩의 대표 홈페이지 및 실시간 견적 문의 시스템" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="에스티트레이딩 (ST Trading)" />
    <meta property="og:description" content="화장품 원료 공급 전문 기업 에스티트레이딩의 대표 홈페이지 및 실시간 견적 문의 시스템" />
    <meta property="og:url" content="https://sttrading.pages.dev" />
    <title>에스티트레이딩 (ST Trading)</title>
    <!-- High priority preload for instant 0-lag hero banner rendering -->
    <link rel="preload" href="/images/두번째.jpg" as="image" type="image/jpeg" fetchpriority="high" />
    <link rel="preload" href="/images/slide1.jpg" as="image" type="image/jpeg" />
    <script>
      window.addEventListener('error', function(e) {
        console.error('Diagnostic error caught:', e);
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100vw';
        div.style.height = '100vh';
        div.style.backgroundColor = '#fff1f2';
        div.style.color = '#9f1239';
        div.style.padding = '24px';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.innerHTML = '<h2>[에스티트레이딩 실행 오류 / Runtime Error]</h2>' +
                        '<p style="font-weight: bold; font-size: 16px;">오류 메시지: ' + e.message + '</p>' +
                        '<p>파일: ' + e.filename + ' (라인: ' + e.lineno + ', 열: ' + e.colno + ')</p>' +
                        '<pre style="background: #ffe4e6; padding: 16px; border-radius: 8px; border: 1px solid #fecdd3; overflow: auto; max-width: 100%;">' +
                        (e.error ? e.error.stack : 'Stack trace not available') +
                        '</pre>';
        if (document.body) {
          document.body.appendChild(div);
        } else {
          window.addEventListener('DOMContentLoaded', function() {
            document.body.appendChild(div);
          });
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Diagnostic unhandled rejection caught:', e);
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100vw';
        div.style.height = '100vh';
        div.style.backgroundColor = '#fef3c7';
        div.style.color = '#92400e';
        div.style.padding = '24px';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.innerHTML = '<h2>[비동기 실행 오류 / Promise Rejection]</h2>' +
                        '<p style="font-weight: bold; font-size: 16px;">이유: ' + (e.reason ? (e.reason.message || e.reason) : 'Unknown promise rejection') + '</p>' +
                        '<pre style="background: #fef3c7; padding: 16px; border-radius: 8px; border: 1px solid #fde68a; overflow: auto; max-width: 100%;">' +
                        (e.reason && e.reason.stack ? e.reason.stack : 'Stack trace not available') +
                        '</pre>';
        if (document.body) {
          document.body.appendChild(div);
        } else {
          window.addEventListener('DOMContentLoaded', function() {
            document.body.appendChild(div);
          });
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
